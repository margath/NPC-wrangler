<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPC & PC Tracker - Version 1.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        /* Base styles */
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background-color: #1e1e24; color: #e0e0e0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #2b2b36; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; flex-wrap: wrap; gap: 15px; }
        .grid-view { padding: 30px; display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        
        /* Card Styles */
        .npc-card { background: #2a2a35; border-radius: 10px; border: 1px solid #444; position: relative; display: flex; flex-direction: column; overflow: hidden; transition: transform 0.2s; }
        .npc-card.pc { border: 2px solid #f1c40f; box-shadow: 0 0 10px rgba(241, 196, 15, 0.2); }
        .npc-card.travelling { border: 2px solid #2ecc71; box-shadow: 0 0 10px rgba(46, 204, 113, 0.2); }
        .npc-card.hometown-focus { border: 2px solid #3498db; }
        .npc-card.dead { opacity: 0.6; filter: grayscale(0.8); }
        .card-content { padding: 15px; flex-grow: 1; }
        
        .npc-name { font-size: 20px; margin: 0; color: #fff; display: flex; justify-content: space-between; align-items: center; }
        .npc-meta { font-size: 12px; color: #3498db; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; }
        .npc-tagline { font-size: 13px; color: #bdc3c7; font-style: italic; margin-bottom: 5px; }
        .description-box { background: #1a1a20; padding: 10px; border-radius: 4px; font-size: 13px; margin: 10px 0; border: 1px solid #333; min-height: 40px; }
        .secret-box { background: #2d1b2d; border: 1px solid #9b59b6; color: #d192e8; padding: 10px; border-radius: 4px; font-size: 13px; font-style: italic; margin-bottom: 10px; }
        
        /* Badges & Statuses */
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 5px; vertical-align: middle; font-weight: bold; color: #000; }
        .badge-pc { background: #f1c40f; }
        .badge-travelling { background: #2ecc71; }
        .status-container { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .status-pill { background: #e74c3c; color: white; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .status-pill.revived { background: #e67e22; }
        
        /* Forms & Inputs */
        input, select, textarea { width: 100%; padding: 8px; margin: 5px 0; border-radius: 4px; border: 1px solid #444; background: #1a1a20; color: white; box-sizing: border-box; }
        .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; background: #1a1a20; padding: 10px; border-radius: 4px; border: 1px solid #444; max-height: 150px; overflow-y: auto; }
        .checkbox-grid label { font-size: 12px; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .checkbox-grid input[type="checkbox"] { width: auto; margin: 0; }

        /* Buttons & UI */
        .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .controls select, .controls button { height: 38px; box-sizing: border-box; margin: 0; padding: 0 15px; font-size: 14px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; transition: opacity 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .controls select { width: auto; background: #1a1a20; border: 1px solid #444; color: white; }
        
        button.add-btn { background: #2ecc71; color: #111; }
        button.dm-btn { background: #9b59b6; color: white; }
        button.combat-btn { background: #e74c3c; color: white; }
        button.combat-btn.active { background: #c0392b; border: 2px solid #fff; }
        button.rest-btn { background: #3498db; color: white; }
        button.cloud-btn { background: #2c3e50; color: white; border: 1px solid #555; }
        button.login-btn { background: #f39c12; color: #111; }
        
        /* Initiative */
        .init-box { display: flex; align-items: center; gap: 5px; background: #1a1a20; padding: 5px; border-radius: 4px; border: 1px solid #444; margin-top: 10px; }
        .init-box input { width: 60px; margin: 0; text-align: center; font-weight: bold; font-size: 16px; }
        
        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal-box { background: #2a2a35; padding: 25px; border-radius: 8px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }

        /* Header Layout Specifics */
        .header-left { display: flex; align-items: center; gap: 15px; }
        .qr-container { background: white; padding: 4px; border-radius: 4px; cursor: pointer; transition: transform 0.2s; display: flex; }
        .qr-container:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <a href="https://tools.gameportal.win/" target="_blank" title="Go to Game Portal" class="qr-container">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=90x90&data=https://tools.gameportal.win/&margin=0" alt="Game Portal QR" width="45" height="45" style="display: block;">
            </a>
            <h1 style="margin: 0; font-size: 24px;">👤 NPC Tracker <span style="font-size: 12px; color: #888;">v1.0</span></h1>
        </div>
        <div class="controls">
            <select id="hometown-filter" onchange="renderAll()">
                <option value="">Sort by Hometown...</option>
            </select>
            <button class="combat-btn" id="combat-toggle-btn" onclick="toggleCombat()">⚔️ Toggle Combat</button>
            <button class="rest-btn" onclick="triggerLongRest()">🏕️ Long Rest</button>
            <button class="cloud-btn" onclick="syncToCloud()">☁️ Cloud Save</button>
            <button class="dm-btn" onclick="exportSessionLog()">📋 Copy Session Log</button>
            <button class="add-btn" onclick="openAddModal()">+ New PC/NPC</button>
            <button class="login-btn" id="login-btn" onclick="openLoginModal()">Login</button>
        </div>
    </header>

    <main id="npc-grid" class="grid-view"></main>

    <div id="npc-modal" class="modal-overlay">
        <div class="modal-box">
            <h2 id="modal-title">Add PC/NPC</h2>
            
            <label style="font-size: 14px; font-weight: bold; margin-bottom: 10px; display: block;">
                <input type="checkbox" id="f-isPC" style="width: auto;"> Is this a Player Character (PC)?
            </label>

            <input type="text" id="f-name" placeholder="Name">
            <input type="text" id="f-tagline" placeholder="Tagline (e.g. 'The brooding rogue')">
            <input type="text" id="f-hometown" placeholder="Hometown (or select from list)">
            <textarea id="f-description" placeholder="Public Description"></textarea>
            <textarea id="f-secret" placeholder="Secret (DM/Owner Only)"></textarea>
            
            <label style="font-size: 12px; margin-top: 10px; display: block;">
                <input type="checkbox" id="f-travelling" style="width: auto;"> Currently travelling with party?
            </label>

            <h4 style="margin: 15px 0 5px 0;">Statuses</h4>
            <div class="checkbox-grid" id="status-grid">
                </div>

            <div style="display:flex; gap: 10px; margin-top: 20px;">
                <button onclick="saveEntity()" class="add-btn" style="flex:1; height: 40px;">Save</button>
                <button onclick="closeModal('npc-modal')" style="background:#555; color:white; height: 40px;">Cancel</button>
            </div>
        </div>
    </div>

    <div id="login-modal" class="modal-overlay">
        <div class="modal-box" style="max-width: 300px;">
            <h2>Player Login</h2>
            <p style="font-size: 12px; color: #aaa;">Leave empty and click DM for Game Master access.</p>
            <select id="login-player-select">
                <option value="">Select Player...</option>
                </select>
            <input type="password" id="login-pin" placeholder="Enter PIN">
            <div style="display:flex; gap: 10px; margin-top: 15px;">
                <button onclick="attemptLogin()" class="login-btn" style="flex:1;">Login</button>
                <button onclick="loginAsDM()" class="dm-btn" style="flex:1;">DM Override</button>
            </div>
            <button onclick="closeModal('login-modal')" style="width: 100%; margin-top: 10px; background:#555; color:white; padding: 8px;">Cancel</button>
        </div>
    </div>

    <script>
        // --- CONSTANTS & DATA ---
        // 1. Google Apps Script Web App URL for Player Logins
        // Make sure the GAS Web App is deployed as "Anyone" and returns JSON
        const GAS_WEB_APP_URL = ""; 
        
        // 2. Cloud Save API Endpoint
        const CLOUD_API_ENDPOINT = ""; 
        
        const HOMETOWNS = ["Solomani Rim", "Terra", "Vanejen", "Spinward Marches", "Waterdeep", "Neverwinter", "Baldur's Gate"];
        const STATUSES = [
            "Blinded", "Charmed", "Deafened", "Frightened", "Grappled", 
            "Incapacitated", "Invisible", "Paralyzed", "Petrified", "Poisoned", 
            "Prone", "Restrained", "Stunned", "Unconscious", "Exhaustion", 
            "Dead", "Revived -3", "Revived -2", "Revived -1"
        ];

        // --- STATE MANAGEMENT ---
        const state = {
            entities: [],
            currentUser: null, 
            currentCharacter: null, 
            isDM: false,
            combatMode: false,
            playersFromSheet: [] 
        };

        // --- INIT & DATABASE VALIDATION ---
        function init() {
            checkDatabaseVersion();
            
            // Setup Hometown Filter
            const filter = document.getElementById('hometown-filter');
            HOMETOWNS.forEach(h => {
                const opt = document.createElement('option');
                opt.value = h; opt.innerText = h;
                filter.appendChild(opt);
            });

            // Setup Status Checkboxes
            const statusGrid = document.getElementById('status-grid');
            STATUSES.forEach(s => {
                statusGrid.innerHTML += `<label><input type="checkbox" value="${s}" class="status-cb"> ${s}</label>`;
            });

            fetchPlayersFromSheet();
            renderAll();
        }

        function checkDatabaseVersion() {
            let dbData = localStorage.getItem('dndDatabase');
            if (dbData) {
                try {
                    dbData = JSON.parse(dbData);
                    if (dbData.type === 'NPC Database' && dbData.version === '1.0') {
                        state.entities = dbData.entities || [];
                        return;
                    }
                } catch (e) { console.error("Database parse error", e); }
            }
            state.entities = [];
            saveLocalDatabase();
        }

        function saveLocalDatabase() {
            const dbData = {
                type: 'NPC Database',
                version: '1.0',
                entities: state.entities
            };
            localStorage.setItem('dndDatabase', JSON.stringify(dbData));
        }

        // --- CLOUD SAVING LOGIC ---
        async function syncToCloud() {
            if (!CLOUD_API_ENDPOINT) {
                alert("Cloud Sync is ready! Please paste your API URL into the CLOUD_API_ENDPOINT variable.");
                return;
            }

            const payload = {
                type: 'NPC Database',
                version: '1.0',
                entities: state.entities,
                lastUpdated: new Date().toISOString()
            };

            try {
                const response = await fetch(CLOUD_API_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("✅ Successfully synced to the cloud!");
                } else {
                    console.error("Cloud Error:", await response.text());
                    alert("❌ Cloud sync failed. Check browser console for details.");
                }
            } catch (error) {
                console.error("Network/Fetch Error:", error);
                alert("❌ Network error during cloud sync.");
            }
        }

        // --- GOOGLE APPS SCRIPT LOGIN LOGIC ---
        async function fetchPlayersFromSheet() {
            if (!GAS_WEB_APP_URL) {
                // Fallback dummy data if no URL provided
                state.playersFromSheet = [
                    { PlayerName: "Alice", PIN: "1234", CharacterName: "Lyra" },
                    { PlayerName: "Bob", PIN: "5678", CharacterName: "Grog" }
                ];
                populateLoginDropdown();
                return;
            }
            try {
                const response = await fetch(GAS_WEB_APP_URL);
                const data = await response.json(); // Direct JSON parsing
                
                // Assuming GAS returns an array of objects like: [{PlayerName: "Alice", PIN: "123", CharacterName: "Lyra"}]
                if (Array.isArray(data)) {
                    state.playersFromSheet = data.filter(p => p.PlayerName); 
                } else if (data.data && Array.isArray(data.data)) {
                    // Fallback just in case your GAS wraps the array in a "data" property
                    state.playersFromSheet = data.data.filter(p => p.PlayerName);
                }

                populateLoginDropdown();
            } catch (e) {
                console.error("Failed to fetch player sheet from Apps Script:", e);
            }
        }

        function populateLoginDropdown() {
            const select = document.getElementById('login-player-select');
            select.innerHTML = '<option value="">Select Player...</option>';
            state.playersFromSheet.forEach(p => {
                select.innerHTML += `<option value="${p.PlayerName}">${p.PlayerName} (${p.CharacterName})</option>`;
            });
        }

        function openLoginModal() {
            document.getElementById('login-modal').style.display = 'flex';
            document.getElementById('login-pin').value = '';
        }

        function attemptLogin() {
            const playerName = document.getElementById('login-player-select').value;
            const pin = document.getElementById('login-pin').value;
            
            if (!playerName) return alert("Select a player!");
            
            // Ensure both are strings for exact comparison
            const playerRec = state.playersFromSheet.find(p => p.PlayerName === playerName);
            if (playerRec && String(playerRec.PIN) === String(pin)) {
                state.currentUser = playerRec.PlayerName;
                state.currentCharacter = playerRec.CharacterName;
                state.isDM = false;
                updateLoginUI();
                closeModal('login-modal');
                renderAll();
            } else {
                alert("Incorrect PIN.");
            }
        }

        function loginAsDM() {
            state.currentUser = "DM";
            state.currentCharacter = null;
            state.isDM = true;
            updateLoginUI();
            closeModal('login-modal');
            renderAll();
        }

        function updateLoginUI() {
            const btn = document.getElementById('login-btn');
            if (state.isDM) {
                btn.innerText = "Logged in: DM";
                btn.style.background = "#9b59b6";
                btn.style.color = "white";
            } else {
                btn.innerText = `Logged in: ${state.currentUser}`;
                btn.style.background = "#2ecc71";
            }
        }

        // --- RENDER LOGIC ---
        function renderAll() {
            const grid = document.getElementById('npc-grid');
            const selectedHometown = document.getElementById('hometown-filter').value;
            grid.innerHTML = '';

            const displayList = [...state.entities].sort((a, b) => {
                if (state.combatMode) {
                    return (b.initiative || 0) - (a.initiative || 0);
                }
                const getPriority = (ent) => {
                    if (ent.isTravelling) return 4; 
                    if (ent.isPC) return 3; 
                    if (ent.hometown === selectedHometown) return 2; 
                    return 1; 
                };
                return getPriority(b) - getPriority(a) || a.name.localeCompare(b.name);
            });

            displayList.forEach(ent => {
                const isOwner = (state.currentUser === ent.createdBy) || (state.currentCharacter && ent.name === state.currentCharacter);
                const canSeeSecret = state.isDM || isOwner;
                const isDead = ent.statuses && ent.statuses.includes("Dead");
                
                let classes = ['npc-card'];
                if (ent.isPC) classes.push('pc');
                if (ent.isTravelling) classes.push('travelling');
                if (ent.hometown === selectedHometown && !state.combatMode) classes.push('hometown-focus');
                if (isDead) classes.push('dead');

                const card = document.createElement('div');
                card.className = classes.join(' ');
                
                let statusHTML = '';
                if (ent.statuses && ent.statuses.length > 0) {
                    statusHTML = `<div class="status-container">` + 
                        ent.statuses.map(s => {
                            let pClass = s.includes("Revived") ? 'status-pill revived' : 'status-pill';
                            return `<span class="${pClass}">${s}</span>`;
                        }).join('') + `</div>`;
                }

                let initBoxHTML = '';
                if (state.combatMode) {
                    const disabled = state.isDM || isOwner ? '' : 'disabled';
                    initBoxHTML = `
                        <div class="init-box">
                            <span style="font-size:12px; font-weight:bold; color:#e74c3c;">INIT:</span>
                            <input type="number" value="${ent.initiative || 0}" 
                                onchange="updateInitiative('${ent.id}', this.value)" ${disabled}>
                        </div>
                    `;
                }
                
                card.innerHTML = `
                    <div class="card-content">
                        <div class="npc-meta">
                            ${ent.hometown || 'Unknown Origin'}
                            ${ent.isPC ? '<span class="badge badge-pc">PC</span>' : ''}
                            ${ent.isTravelling ? '<span class="badge badge-travelling">TRAVELLING</span>' : ''}
                        </div>
                        <h3 class="npc-name">${ent.name}</h3>
                        ${ent.tagline ? `<div class="npc-tagline">"${ent.tagline}"</div>` : ''}
                        
                        ${statusHTML}
                        ${initBoxHTML}
                        
                        <div class="description-box">${ent.description}</div>
                        ${canSeeSecret ? `<div class="secret-box"><strong>Secret:</strong> ${ent.secret || 'None'}</div>` : ''}
                        
                        <div style="margin-top: 10px; display: flex; gap: 5px;">
                            ${(state.isDM || isOwner) ? `<button onclick="editEntity('${ent.id}')" style="font-size:11px; background:#444; color:white; padding: 5px 10px;">Edit Data</button>` : ''}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- GAME MECHANICS ---
        function toggleCombat() {
            state.combatMode = !state.combatMode;
            const btn = document.getElementById('combat-toggle-btn');
            if (state.combatMode) {
                btn.classList.add('active');
                btn.innerText = "🛑 End Combat";
            } else {
                btn.classList.remove('active');
                btn.innerText = "⚔️ Toggle Combat";
                state.entities.forEach(e => e.initiative = 0);
                saveLocalDatabase();
            }
            renderAll();
        }

        function updateInitiative(id, val) {
            const ent = state.entities.find(e => e.id === id);
            if (ent) {
                ent.initiative = parseInt(val) || 0;
                saveLocalDatabase();
                renderAll(); 
            }
        }

        function triggerLongRest() {
            if (!confirm("Trigger a Long Rest? This will clear temporary statuses and progress Revived statuses.")) return;
            
            const tempStatuses = ["Blinded", "Charmed", "Deafened", "Frightened", "Grappled", "Incapacitated", "Invisible", "Paralyzed", "Petrified", "Poisoned", "Prone", "Restrained", "Stunned", "Unconscious"];
            
            state.entities.forEach(ent => {
                if (!ent.statuses) ent.statuses = [];
                
                ent.statuses = ent.statuses.filter(s => !tempStatuses.includes(s));
                
                if (ent.statuses.includes("Revived -3")) {
                    ent.statuses = ent.statuses.filter(s => s !== "Revived -3");
                    ent.statuses.push("Revived -2");
                } else if (ent.statuses.includes("Revived -2")) {
                    ent.statuses = ent.statuses.filter(s => s !== "Revived -2");
                    ent.statuses.push("Revived -1");
                } else if (ent.statuses.includes("Revived -1")) {
                    ent.statuses = ent.statuses.filter(s => s !== "Revived -1");
                }
            });
            
            saveLocalDatabase();
            renderAll();
            alert("Long Rest completed. Statuses updated.");
        }

        // --- ADD/EDIT LOGIC ---
        function openAddModal() {
            document.getElementById('modal-title').innerText = "Add New Character";
            resetForm();
            document.getElementById('npc-modal').style.display = 'flex';
        }

        function editEntity(id) {
            const ent = state.entities.find(e => e.id === id);
            document.getElementById('f-isPC').checked = ent.isPC || false;
            document.getElementById('f-name').value = ent.name;
            document.getElementById('f-tagline').value = ent.tagline || '';
            document.getElementById('f-hometown').value = ent.hometown;
            document.getElementById('f-description').value = ent.description;
            document.getElementById('f-secret').value = ent.secret || '';
            document.getElementById('f-travelling').checked = ent.isTravelling;
            
            document.querySelectorAll('.status-cb').forEach(cb => {
                cb.checked = ent.statuses && ent.statuses.includes(cb.value);
            });

            document.getElementById('npc-modal').dataset.editId = id;
            document.getElementById('modal-title').innerText = "Edit Character";
            document.getElementById('npc-modal').style.display = 'flex';
        }

        function saveEntity() {
            const id = document.getElementById('npc-modal').dataset.editId || Date.now().toString();
            const activeStatuses = Array.from(document.querySelectorAll('.status-cb:checked')).map(cb => cb.value);

            const ent = {
                id,
                isPC: document.getElementById('f-isPC').checked,
                name: document.getElementById('f-name').value,
                tagline: document.getElementById('f-tagline').value,
                hometown: document.getElementById('f-hometown').value,
                description: document.getElementById('f-description').value,
                secret: document.getElementById('f-secret').value,
                isTravelling: document.getElementById('f-travelling').checked,
                statuses: activeStatuses,
                initiative: 0,
                createdBy: state.entities.find(e => e.id === id)?.createdBy || (state.currentUser || "DM")
            };

            const idx = state.entities.findIndex(n => n.id === id);
            if(idx > -1) {
                ent.initiative = state.entities[idx].initiative;
                state.entities[idx] = ent;
            } else {
                state.entities.push(ent);
            }

            saveLocalDatabase();
            closeModal('npc-modal');
            renderAll();
        }

        // --- EXPORT LOGIC ---
        function exportSessionLog() {
            let log = `WEEKLY GAME SESSION LOG\n========================\n\n`;
            
            log += `ACTIVE PARTY & COMPANIONS:\n`;
            state.entities.filter(n => n.isTravelling || n.isPC).forEach(n => {
                const tagStr = n.tagline ? ` [${n.tagline}]` : '';
                const statusStr = (n.statuses && n.statuses.length > 0) ? ` {Status: ${n.statuses.join(', ')}}` : '';
                log += `- ${n.name}${tagStr}${statusStr}\n  Hometown: ${n.hometown}\n  ${n.description}\n\n`;
            });

            log += `OTHER NOTABLE NPCS:\n`;
            state.entities.filter(n => !n.isTravelling && !n.isPC).forEach(n => {
                const tagStr = n.tagline ? ` [${n.tagline}]` : '';
                log += `- ${n.name}${tagStr}: ${n.description}\n`;
            });

            navigator.clipboard.writeText(log).then(() => {
                alert("Session log copied to your clipboard successfully!");
            }).catch(err => {
                console.error("Failed to copy text: ", err);
                alert("Could not copy to clipboard. Check browser permissions.");
            });
        }

        // --- UTILS ---
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function resetForm() {
            document.getElementById('f-isPC').checked = false;
            document.getElementById('f-name').value = '';
            document.getElementById('f-tagline').value = '';
            document.getElementById('f-hometown').value = '';
            document.getElementById('f-description').value = '';
            document.getElementById('f-secret').value = '';
            document.getElementById('f-travelling').checked = false;
            document.querySelectorAll('.status-cb').forEach(cb => cb.checked = false);
            delete document.getElementById('npc-modal').dataset.editId;
        }

        // Run
        init();
    </script>
</body>
</html>
